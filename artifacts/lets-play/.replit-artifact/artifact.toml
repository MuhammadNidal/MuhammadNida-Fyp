kind = "mobile"
previewPath = "/"
title = "Let's Play"
version = "1.0.0"
id = "artifacts/lets-play"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19850

[services.development]
run = "pnpm --filter @workspace/lets-play run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lets-play", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/lets-play", "run", "serve" ]

[services.env]
PORT = "19850"
BASE_PATH = "/"
